name: Setup pnpm
description: Setup Vite+ (vp), Node.js, dependency cache, and install dependencies

inputs:
  node-version:
    description: Node.js version to use
    required: false
    default: 'lts/*'

runs:
  using: composite
  steps:
    - name: Setup Vite+
      uses: voidzero-dev/setup-vp@v1
      with:
        node-version: ${{ inputs.node-version }}
        cache: true
