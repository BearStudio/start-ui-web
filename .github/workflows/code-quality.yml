name: 🔎 Code Quality

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format Check
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24

      - name: Check formatting
        run: pnpm format:check

      - name: Ensure formatting check did not mutate files
        run: git diff --exit-code -- .

  lint-typecheck:
    name: Lint and Typecheck
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24

      - name: Run lint and typecheck
        run: pnpm exec run-p -n lint lint:eslint typecheck

      - name: Ensure lint and typecheck did not mutate files
        run: git diff --exit-code -- .

  dependency-cruiser:
    name: Dependency Cruiser
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24

      - name: Run dependency-cruiser
        run: pnpm depcruise

      - name: Generate dependency graphs
        if: always()
        run: |
          mkdir -p test-results/dependency-cruiser
          status=0
          pnpm exec depcruise --config .dependency-cruiser.cjs --output-type json --output-to test-results/dependency-cruiser/dependency-cruiser.json src || status=$?
          pnpm exec depcruise --config .dependency-cruiser.cjs --output-type dot --output-to test-results/dependency-cruiser/dependency-cruiser.dot src || status=$?
          pnpm exec depcruise --config .dependency-cruiser.cjs --output-type mermaid --output-to test-results/dependency-cruiser/dependency-cruiser.mmd src || status=$?
          exit "$status"

      - name: Upload dependency graphs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-cruiser-graphs
          path: test-results/dependency-cruiser/
          retention-days: 30

      - name: Ensure static checks did not mutate files
        run: git diff --exit-code -- .

  audit:
    name: Audit
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24

      - name: Run dependency audit
        run: pnpm security:audit

      - name: Ensure audit did not mutate files
        run: git diff --exit-code -- .

  architecture:
    name: Architecture Checks
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24

      - name: Run test layering check
        run: pnpm check:test-layering

      - name: Run architecture tests
        run: |
          mkdir -p test-results/architecture
          pnpm exec vitest run --project=unit tests/architecture --reporter=default --reporter=junit --outputFile.junit=test-results/architecture/junit.xml

      - name: Upload architecture test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: architecture-test-report
          path: test-results/architecture/
          retention-days: 30

      - name: Ensure architecture checks did not mutate files
        run: git diff --exit-code -- .

  coverage:
    name: Coverage
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      VITE_BASE_URL: http://localhost:3000
      VITE_S3_BUCKET_PUBLIC_URL: 'http://localhost:9000/default'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Run tests
        run: |
          mkdir -p test-results/vitest
          SKIP_ENV_VALIDATION=true pnpm test:coverage -- --reporter=default --reporter=junit --outputFile.junit=test-results/vitest/junit.xml

      - name: Upload Vitest reports and coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vitest-reports-and-coverage
          path: |
            test-results/vitest/
            coverage/
          retention-days: 30

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@cddd853df119a48c5be31a973f8cd97e12e35e16 # v6.0.1
        with:
          files: ./coverage/lcov.info
          disable_search: true
          flags: vitest
          name: vitest
          fail_ci_if_error: true
          token: ${{ env.CODECOV_TOKEN }}

  postgres-integration:
    name: PostgreSQL Integration
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24

      - name: Run PostgreSQL integration tests
        run: |
          mkdir -p test-results/vitest-postgres
          pnpm test:integration:postgres -- --reporter=default --reporter=junit --outputFile.junit=test-results/vitest-postgres/junit.xml

      - name: Upload PostgreSQL integration test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: postgres-integration-test-report
          path: test-results/vitest-postgres/
          retention-days: 30

  build:
    name: Build
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true
      VITE_BASE_URL: http://localhost:3000
      VITE_S3_BUCKET_PUBLIC_URL: 'http://localhost:9000/default'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24

      - name: Build app
        run: |
          mkdir -p test-results/build
          set -o pipefail
          pnpm build 2>&1 | tee test-results/build/build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-log
          path: test-results/build/build.log
          retention-days: 30
