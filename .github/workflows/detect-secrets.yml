name: Detect Secrets

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-secrets:
    name: detect-secrets
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DETECT_SECRETS_VERSION: 1.5.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install detect-secrets
        run: |
          python3 -m venv "$RUNNER_TEMP/detect-secrets-venv"
          "$RUNNER_TEMP/detect-secrets-venv/bin/python" -m pip install "detect-secrets==${DETECT_SECRETS_VERSION}"
          echo "$RUNNER_TEMP/detect-secrets-venv/bin" >> "$GITHUB_PATH"

      - name: Check committed files for secrets
        run: git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline
