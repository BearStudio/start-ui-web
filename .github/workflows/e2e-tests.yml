name: 🧪 E2E Tests
on:
  push:
    branches:
      - master
      - main
      - develop
      - staging
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  E2E:
    name: E2E (${{ matrix.browser }})
    if: github.event.pull_request.draft == false
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    env:
      VITE_BASE_URL: http://localhost:3000
      VITE_ENV_NAME: tests
      VITE_IS_DEMO: false
      EMAIL_FROM: Start UI <noreply@example.com>
      EMAIL_DELIVERY_DISABLED: true
      S3_HOST: localhost:9000
      S3_BUCKET_NAME: default
      S3_SECURE: false
      S3_FORCE_PATH_STYLE: true
      VITE_S3_BUCKET_PUBLIC_URL: http://localhost:9000/default

    services:
      maildev:
        image: maildev/maildev:2.2.1@sha256:180ef51f65eefebb0e7122d8308813c1fd7bff164bc440ce5a3c2feee167a810
        options: >-
          --health-cmd "wget --spider --no-verbose --tries=1 -T 3 http://localhost:1080/healthz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 1025:1025
          - 1080:1080

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Generate test secrets
        shell: bash
        run: |
          postgres_password="$(openssl rand -hex 16)"

          {
            printf '%s=%s\n' 'AUTH_SECRET' "$(openssl rand -base64 32)"
            printf '%s=%s\n' 'DATABASE_URL' "postgres://startui:${postgres_password}@localhost:5432/startui"
            printf '%s=%s\n' 'POSTGRES_DB' 'startui'
            printf '%s=%s\n' 'POSTGRES_USER' 'startui'
            printf '%s=%s\n' 'POSTGRES_PASSWORD' "${postgres_password}"
            printf '%s=%s\n' 'RESEND_API_KEY' "re_$(openssl rand -hex 16)"
            printf '%s=%s\n' 'S3_ACCESS_KEY_ID' "startui-$(openssl rand -hex 8)"
            printf '%s=%s\n' 'S3_SECRET_ACCESS_KEY' "$(openssl rand -hex 24)"
            printf '%s=%s\n' 'DOCKER_MINIO_USERNAME' "minio-$(openssl rand -hex 8)"
            printf '%s=%s\n' 'DOCKER_MINIO_PASSWORD' "$(openssl rand -hex 24)"
          } >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          browsers: chromium ${{ matrix.browser }}

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -p 5432:5432 \
            -e POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            -e POSTGRES_USER="$POSTGRES_USER" \
            -e POSTGRES_DB="$POSTGRES_DB" \
            postgres:16.1@sha256:09f23e02d76670d3b346a3c00aa33a27cf57aab8341eedfcdaed41459d14f5c4

          postgres_ready=0
          for attempt in {1..30}; do
            if docker exec postgres pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; then
              postgres_ready=1
              echo "PostgreSQL is ready"
              break
            fi

            echo "Waiting for PostgreSQL... ($attempt/30)"
            sleep 2
          done

          if [ "$postgres_ready" -ne 1 ]; then
            echo "PostgreSQL failed to become ready" >&2
            docker exec postgres pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" || true
            docker logs postgres || true
            exit 1
          fi

      - name: Start MinIO server
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER="$DOCKER_MINIO_USERNAME" \
            -e MINIO_ROOT_PASSWORD="$DOCKER_MINIO_PASSWORD" \
            minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1@sha256:7330be2e7320a7a699b36f72bd06a94d8a21ec9f6f397345d9c38fc6751141f5 \
            server /data --console-address :9001

          # Wait for MinIO to be ready
          until curl -sf http://localhost:9000/minio/health/live; do
            echo "Waiting for MinIO..."
            sleep 2
          done
          echo "MinIO is ready"

      - name: Setup MinIO bucket
        run: |
          # Install MinIO client
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/archive/mc.RELEASE.2025-08-13T08-35-41Z -o "$RUNNER_TEMP/mc"
          echo "01f866e9c5f9b87c2b09116fa5d7c06695b106242d829a8bb32990c00312e891  $RUNNER_TEMP/mc" | sha256sum -c -
          chmod +x "$RUNNER_TEMP/mc"
          sudo mv "$RUNNER_TEMP/mc" /usr/local/bin/mc

          # Configure MinIO client
          mc alias set minio http://localhost:9000 "$DOCKER_MINIO_USERNAME" "$DOCKER_MINIO_PASSWORD"

          # Create user with access key
          mc admin user add minio "$S3_ACCESS_KEY_ID" "$S3_SECRET_ACCESS_KEY"
          mc admin policy attach minio readwrite --user "$S3_ACCESS_KEY_ID"

          # Create bucket and set permissions
          mc mb --ignore-existing "minio/$S3_BUCKET_NAME"
          mc anonymous set download "minio/$S3_BUCKET_NAME"

      - name: Migrate database
        run: pnpm db:push

      - name: Add default data into database
        run: pnpm db:seed

      - name: Run Playwright tests
        run: pnpm test:e2e --project=${{ matrix.browser }}

      - name: Upload Playwright report and traces
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report-and-traces-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30
