services:
  postgres:
    image: postgres:16.1
    env_file:
      - .env
    ports:
      - '127.0.0.1::5432'
    environment:
      POSTGRES_DB: $DOCKER_DATABASE_NAME
      POSTGRES_USER: $DOCKER_DATABASE_USERNAME
      POSTGRES_PASSWORD: $DOCKER_DATABASE_PASSWORD
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $DOCKER_DATABASE_NAME']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    ports:
      - '127.0.0.1::9000'
      - '127.0.0.1::9001'
    environment:
      - MINIO_ROOT_USER=${DOCKER_MINIO_USERNAME}
      - MINIO_ROOT_PASSWORD=${DOCKER_MINIO_PASSWORD}
    volumes:
      - minio:/data/minio
    command: minio server /data/minio --console-address :9001
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  maildev:
    image: maildev/maildev:2.2.1
    ports:
      - '127.0.0.1::1025'
      - '127.0.0.1::1080'
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider --no-verbose --tries=1 -T 3 http://localhost:1080/healthz']
      interval: 5s
      timeout: 5s
      retries: 5

  createdb:
    image: postgres:16.1
    profiles:
      - init
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    network_mode: service:postgres
    entrypoint: ['']
    command:
      - sh
      - -c
      - >
        PGPASSWORD=$DOCKER_DATABASE_PASSWORD
        createdb -h localhost -U $DOCKER_DATABASE_USERNAME "$DOCKER_DATABASE_NAME" 2>/dev/null
        && echo "Database \"$DOCKER_DATABASE_NAME\" created."
        || echo "Database \"$DOCKER_DATABASE_NAME\" already exists, skipping."
    restart: 'no'

  createbucket:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    profiles:
      - init
    depends_on:
      minio:
        condition: service_healthy
    network_mode: service:minio
    entrypoint: ['']
    command: [
        'sh',
        '-c',
        '
        mc alias set default "http://localhost:9000" "${DOCKER_MINIO_USERNAME}" "${DOCKER_MINIO_PASSWORD}";
        mc admin user add default ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY};
        mc admin policy attach default readwrite --user ${S3_ACCESS_KEY_ID};
        mc mb --ignore-existing default/${S3_BUCKET_NAME} 2>/dev/null;
        mc anonymous set download default/${S3_BUCKET_NAME};
        echo ''Bucket configuration completed successfully'';
        ',
      ]
    restart: 'no'

volumes:
  minio:
