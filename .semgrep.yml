rules:
  - id: no-session-token-in-client-features
    message: Do not expose or pass raw session tokens through client-facing feature code; use session IDs and resolve tokens server-side.
    severity: ERROR
    languages:
      - typescript
    paths:
      include:
        - /src/features/**/*.ts
        - /src/features/**/*.tsx
        - /src/modules/**/presentation/**/*.ts
        - /src/modules/**/presentation/**/*.tsx
    pattern-either:
      - pattern: sessionToken
      - pattern: $SESSION.session.token
      - pattern: $SESSION.token

  - id: no-session-token-server-function-input
    message: Server function input validators must not accept raw session tokens from clients; accept a sessionId and resolve the token server-side.
    severity: ERROR
    languages:
      - typescript
    paths:
      include:
        - /src/modules/**/transport/**/*.ts
    pattern: |
      z.object({ ..., sessionToken: z.string(), ... })

  - id: no-id-only-session-cursor-lookup
    message: Session cursor lookups must scope by both session.id and session.userId so one user's cursor cannot affect another user's page.
    severity: ERROR
    languages:
      - typescript
    paths:
      include:
        - /src/modules/user/infrastructure/**/*.ts
    pattern: |
      ctx.db.query.session.findFirst({
        where: eq(session.id, $CURSOR),
        ...
      })

  - id: no-user-update-email-autoverify
    message: User update handlers must not automatically mark changed emails as verified.
    severity: ERROR
    languages:
      - typescript
    paths:
      include:
        - /src/modules/user/infrastructure/**/*.ts
    patterns:
      - pattern-inside: |
          ctx.db
            .update(user)
            ...
      - pattern: |
          {
            ...,
            emailVerified: true,
            ...
          }

  - id: raw-env-access-outside-kernel
    message: Read env via kernel/infrastructure/config/env.ts, not process.env directly.
    languages: [typescript]
    severity: ERROR
    pattern: process.env.$X
    paths:
      exclude:
        - src/modules/kernel/infrastructure/config/**
        - '*.config.ts'
        - '*.config.mjs'
        - '*.cosmos.ts'
        - 'vite.*.ts'
        - vite.config.*
        - drizzle.config.*

  - id: bare-server-new-error
    message: Throw AppError or a domain error subclass, not bare new Error in server code.
    languages: [typescript]
    severity: ERROR
    pattern: new Error(...)
    paths:
      include:
        - src/modules/**/application/**
        - src/modules/**/transport/**
        - src/modules/**/infrastructure/**
      exclude:
        - '**/*.unit.spec.ts'
        - '**/*.test.ts'

  - id: unescaped-like-pattern
    message: Use escapeLikePattern() from kernel before interpolating into LIKE.
    languages: [typescript]
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              `%${$X}%`
          - pattern: |
              "%" + $X + "%"
      - pattern-not: |
          `%${escapeLikePattern(...)}%`

  - id: direct-sdk-import-outside-infrastructure
    message: Drizzle/pg/postgres SDKs are confined to infrastructure or composition.
    languages: [typescript]
    severity: ERROR
    pattern-regex: '^\s*import\s+.*\s+from\s+["''](?:drizzle-orm(?:/[^"'']*)?|postgres|pg)["'']'
    paths:
      exclude:
        - src/modules/*/infrastructure/**
        - src/modules/kernel/infrastructure/**
        - src/composition/**
        - drizzle/**
        - drizzle.config.ts

  - id: cross-feature-deep-import
    message: 'Import other modules through public files: index.ts, presentation.ts, server.ts, or client.ts.'
    languages: [typescript]
    severity: ERROR
    pattern-either:
      - pattern-regex: 'from\s+["''](?:\.{1,2}/)+modules/(?!kernel/)[^/"''\n]+/(?!(?:index|presentation|server|client)(?:\.[^/"''\n]+)?(?:["'']|$))[^"''\n]+["'']'
      - pattern-regex: 'from\s+["'']@/modules/(?!kernel/)[^/"''\n]+/(?!(?:index|presentation|server|client)(?:\.[^/"''\n]+)?(?:["'']|$))[^"''\n]+["'']'
    paths:
      include:
        - src/routes/**/*.ts
        - src/routes/**/*.tsx
        - src/features/**/*.ts
        - src/features/**/*.tsx
        - src/layout/**/*.ts
        - src/layout/**/*.tsx
        - src/devtools/**/*.ts
        - src/devtools/**/*.tsx
        - src/components/**/*.ts
        - src/components/**/*.tsx

  - id: legacy-server-import
    message: src/server was removed; use module-owned public APIs or composition roots.
    languages: [typescript]
    severity: ERROR
    pattern-regex: 'from\s+["'']@/server(?:/[^"'']*)?["'']'

  - id: unsafe-redirect-from-user-input
    message: Validate redirect targets against an allowlist; do not pass raw request input.
    languages: [typescript]
    severity: ERROR
    pattern-either:
      - pattern: 'redirect({ to: $REQ.$X.$Y, ... })'
      - pattern: 'Response.redirect($REQ.$X.$Y, ...)'

  - id: token-or-secret-logging
    message: Do not log tokens, secrets, passwords, or Authorization headers.
    languages: [typescript]
    severity: ERROR
    pattern-either:
      - pattern: '$LOG.$M(..., { ..., token: $T, ... })'
      - pattern: '$LOG.$M(..., { ..., authorization: $A, ... })'
      - pattern: '$LOG.$M(..., { ..., password: $P, ... })'
      - pattern: '$LOG.$M(..., $REQ.headers.authorization, ...)'
      - pattern: 'console.log(..., $REQ.headers.authorization, ...)'
    paths:
      exclude:
        - '**/*.unit.spec.ts'
        - '**/*.test.ts'

  - id: domain-imports-react-or-router
    message: domain/ must not import React or routing libs.
    languages: [typescript]
    severity: ERROR
    pattern-regex: '^\s*import(?:\s+type)?(?:\s+[^;]+?\s+from\s+|\s*)["''](?:react|@tanstack/react-router|@tanstack/react-query)["'']'
    paths:
      include:
        - src/modules/*/domain/**

  - id: ci-oxlint-deny-warnings
    message: CI oxlint runs must include --deny-warnings so warning-level rules fail builds.
    languages: [generic]
    severity: ERROR
    pattern-regex: 'run:\s*pnpm\s+(?:lint|oxlint)(?![^\n]*--deny-warnings)\b[^\n]*'
    paths:
      include:
        - .github/workflows/*.yml
        - .github/workflows/*.yaml

  - id: lefthook-format-changed-stage-fixed
    message: format:changed pre-commit hooks must set stage_fixed true so formatter edits are committed.
    languages: [generic]
    severity: ERROR
    pattern-regex: '(?ms)^pre-commit:\s*\n(?:(?!^\S).)*?^\s{4}format:\s*\n(?=(?:(?!^\s{4}\S).)*^\s{6}run:\s*pnpm\s+format:changed[^\n]*)(?!(?:(?!^\s{4}\S).)*^\s{6}stage_fixed:\s*true)'
    paths:
      include:
        - lefthook.yml
        - lefthook.yaml

  - id: script-git-diff-through-git-utils
    message: Use scripts/lib/git-utils.mjs for changed-file discovery so staged files are included consistently.
    languages: [generic]
    severity: ERROR
    pattern-regex: 'runGit\(\[\s*["'']diff["'']'
    paths:
      include:
        - scripts/*.mjs
      exclude:
        - scripts/lib/git-utils.mjs

  - id: resend-app-error-preserve-provider-status
    message: Preserve Resend provider statusCode when wrapping send failures; use error.statusCode ?? 500.
    languages: [typescript]
    severity: ERROR
    pattern: |
      throw new AppError({
        ...,
        status: 500,
        ...
      })
    paths:
      include:
        - src/modules/kernel/infrastructure/email/**/*.ts
        - src/modules/kernel/infrastructure/email/**/*.tsx
      exclude:
        - '**/*.unit.spec.ts'
        - '**/*.test.ts'

  - id: db-client-no-unguarded-import-meta-env
    message: Guard import.meta.env access in the DB client because seed scripts can run outside Vite.
    languages: [typescript]
    severity: ERROR
    pattern-regex: 'import\.meta\.env\.[A-Za-z_$][A-Za-z0-9_$]*'
    paths:
      include:
        - src/modules/kernel/infrastructure/db/client.ts
