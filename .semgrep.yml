rules:
  - id: no-session-token-in-client-features
    message: Do not expose or pass raw session tokens through client-facing feature code; use session IDs and resolve tokens server-side.
    severity: ERROR
    languages:
      - typescript
    paths:
      include:
        - /src/platform/**/*.ts
        - /src/platform/**/*.tsx
        - /src/modules/**/presentation/**/*.ts
        - /src/modules/**/presentation/**/*.tsx
    pattern-either:
      - pattern: sessionToken
      - pattern: $SESSION.session.token
      - pattern: $SESSION.token

  - id: no-session-token-server-function-input
    message: Server function input validators must not accept raw session tokens from clients; accept a sessionId and resolve the token server-side.
    severity: ERROR
    languages:
      - typescript
    paths:
      include:
        - /src/modules/**/transport/**/*.ts
    pattern: |
      z.object({ ..., sessionToken: z.string(), ... })

  - id: no-silent-session-revocation-noop
    message: Session revocation must not silently return false when a provider token is missing; make the token contract explicit or throw.
    severity: ERROR
    languages:
      - typescript
    paths:
      include:
        - /src/composition/**/*.ts
        - /src/modules/**/infrastructure/**/*.ts
    pattern-either:
      - pattern: |
          if (!$INPUT.providerSessionToken) return false;
      - pattern: |
          if (!$INPUT.providerToken) return false;

  - id: no-id-only-session-cursor-lookup
    message: Session cursor lookups must scope by both session.id and session.userId so one user's cursor cannot affect another user's page.
    severity: ERROR
    languages:
      - typescript
    paths:
      include:
        - /src/modules/user/infrastructure/**/*.ts
    pattern: |
      ctx.db.query.session.findFirst({
        where: eq(session.id, $CURSOR),
        ...
      })

  - id: no-user-update-email-autoverify
    message: User update handlers must not automatically mark changed emails as verified.
    severity: ERROR
    languages:
      - typescript
    paths:
      include:
        - /src/modules/user/infrastructure/**/*.ts
    patterns:
      - pattern-inside: |
          ctx.db
            .update(user)
            ...
      - pattern: |
          {
            ...,
            emailVerified: true,
            ...
          }

  - id: raw-env-access-outside-kernel
    message: Read env via platform/env/config.ts, not process.env directly.
    languages: [typescript]
    severity: ERROR
    pattern: process.env.$X
    paths:
      exclude:
        - src/modules/kernel/infrastructure/config/**
        - src/platform/env/**
        - '*.config.ts'
        - '*.config.mjs'
        - '*.cosmos.ts'
        - 'vite.*.ts'
        - vite.config.*
        - drizzle.config.*

  - id: bare-server-new-error
    message: Throw AppError or a domain error subclass, not bare new Error in server code.
    languages: [typescript]
    severity: ERROR
    pattern: new Error(...)
    paths:
      include:
        - src/modules/**/application/**
        - src/modules/**/transport/**
        - src/modules/**/infrastructure/**
      exclude:
        - '**/*.unit.spec.ts'
        - '**/*.test.ts'

  - id: unescaped-like-pattern
    message: Use escapeLikePattern() from kernel before interpolating into LIKE.
    languages: [typescript]
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              `%${$X}%`
          - pattern: |
              "%" + $X + "%"
      - pattern-not: |
          `%${escapeLikePattern(...)}%`

  - id: direct-sdk-import-outside-infrastructure
    message: Drizzle/pg/postgres SDKs are confined to infrastructure or composition.
    languages: [typescript]
    severity: ERROR
    pattern-regex: '^\s*import\s+.*\s+from\s+["''](?:drizzle-orm(?:/[^"'']*)?|postgres|pg)["'']'
    paths:
      exclude:
        - src/modules/*/infrastructure/**
        - src/modules/kernel/infrastructure/**
        - src/composition/**
        - drizzle/**
        - drizzle.config.ts

  - id: cross-feature-deep-import
    message: 'Import other modules through public files: index.ts, presentation.ts, server.ts, or client.ts.'
    languages: [typescript]
    severity: ERROR
    pattern-either:
      - pattern-regex: 'from\s+["''](?:\.{1,2}/)+modules/(?!kernel/)[^/"''\n]+/(?!(?:index|presentation|server|client)(?:\.[^/"''\n]+)?(?:["'']|$))[^"''\n]+["'']'
      - pattern-regex: 'from\s+["'']@/modules/(?!kernel/)[^/"''\n]+/(?!(?:index|presentation|server|client)(?:\.[^/"''\n]+)?(?:["'']|$))[^"''\n]+["'']'
    paths:
      include:
        - src/routes/**/*.ts
        - src/routes/**/*.tsx

  - id: no-platform-imports-app-code
    message: src/platform must not import modules, routes, or composition.
    languages: [typescript]
    severity: ERROR
    pattern-regex: 'from\s+["'']@/(?:modules|routes|composition)(?:/[^"'']*)?["'']'
    paths:
      include:
        - src/platform/**/*.ts
        - src/platform/**/*.tsx

  - id: no-module-internals-import-composition
    message: Module internals must receive dependencies from factories/public server barrels, not import composition directly.
    languages: [typescript]
    severity: ERROR
    pattern-regex: 'from\s+["'']@/composition(?:/[^"'']*)?["'']'
    paths:
      include:
        - src/modules/**/domain/**/*.ts
        - src/modules/**/domain/**/*.tsx
        - src/modules/**/application/**/*.ts
        - src/modules/**/application/**/*.tsx
        - src/modules/**/infrastructure/**/*.ts
        - src/modules/**/infrastructure/**/*.tsx
        - src/modules/**/transport/**/*.ts
        - src/modules/**/transport/**/*.tsx
        - src/modules/**/presentation/**/*.ts
        - src/modules/**/presentation/**/*.tsx
        - src/modules/**/factory.ts
        - src/modules/**/factory.tsx

  - id: presentation-schema-no-i18n
    message: presentation/schema.ts must emit error codes, not call i18next at schema-build time. The UI translates at render via form-field-error.tsx.
    languages: [typescript]
    severity: ERROR
    pattern-regex: '^\s*import(?:\s+type)?\s+[^;]+from\s+["''](?:i18next|react-i18next)["'']'
    paths:
      include:
        - src/modules/*/presentation/schema.ts

  - id: no-direct-import-meta-env-dev
    message: Read the dev-mode flag through platform/env/config.ts instead of import.meta.env.DEV.
    languages: [typescript]
    severity: ERROR
    pattern-regex: 'import\.meta\.env\.DEV'
    paths:
      exclude:
        - src/platform/env/**
        - '*.config.ts'
        - '*.config.mjs'
        - 'vite.*.ts'
        - vite.config.*

  - id: no-provider-role-domain-cast
    message: Validate provider auth roles through zRole before assigning them to AuthenticatedUser.role.
    languages: [typescript]
    severity: ERROR
    pattern-regex: 'role:\s*[^,\n]+\s+as\s+AuthenticatedUser\[''role''\]'
    paths:
      include:
        - src/modules/auth/infrastructure/**/*.ts
        - src/modules/auth/infrastructure/**/*.tsx
      exclude:
        - '**/*.unit.spec.ts'
        - '**/*.test.ts'

  - id: email-template-no-global-language-mutation
    message: Server-rendered email templates must use fixed translators instead of mutating the global i18n language.
    languages: [typescript]
    severity: ERROR
    pattern: i18n.changeLanguage(...)
    paths:
      include:
        - src/modules/email/presentation/templates/**/*.tsx

  - id: better-auth-client-confined
    message: better-auth client APIs are only allowed in src/modules/auth/presentation/.
    languages: [typescript]
    severity: ERROR
    pattern-regex: '^\s*import(?:\s+type)?\s+[^;]+from\s+["'']better-auth/(?:react|client/plugins)["'']'
    paths:
      exclude:
        - src/modules/auth/presentation/**

  - id: better-auth-access-helpers-confined
    message: Better Auth access-control helpers are only allowed in auth presentation and Better Auth infrastructure.
    languages: [typescript]
    severity: ERROR
    pattern-regex: '^\s*import(?:\s+type)?\s+[^;]+from\s+["'']better-auth/plugins/(?:access|admin/access)["'']'
    paths:
      exclude:
        - src/modules/auth/presentation/**
        - src/modules/auth/infrastructure/better-auth/**

  - id: better-auth-server-confined
    message: better-auth server APIs are only allowed in Better Auth infrastructure and src/composition/auth.ts.
    languages: [typescript]
    severity: ERROR
    pattern-regex: '^\s*import(?:\s+type)?\s+[^;]+from\s+["'']better-auth(?!(?:/react|/client/plugins|/plugins/(?:access|admin/access))["''])(?:/[^"'']*)?["'']'
    paths:
      exclude:
        - src/modules/auth/infrastructure/better-auth/**
        - src/composition/auth.ts

  - id: no-composition-spread-overrides
    message: Composition factories must merge override keys explicitly with ??; spreading overrides can let explicit undefined erase required dependencies.
    languages: [typescript]
    severity: ERROR
    patterns:
      - pattern: |
          return {
            ...$BASE,
            ...overrides,
            ...
          };
    paths:
      include:
        - src/composition/**/*.ts
        - src/composition/**/*.tsx
      exclude:
        - '**/*.unit.spec.ts'
        - '**/*.test.ts'

  - id: no-src-features-imports
    message: src/features was removed; use src/modules/<capability> or src/platform.
    languages: [typescript]
    severity: ERROR
    pattern-regex: 'from\s+["'']@/features(?:/[^"'']*)?["'']'

  - id: no-src-layout-imports
    message: src/layout was moved into the shell module; import from @/modules/shell/presentation.
    languages: [typescript]
    severity: ERROR
    pattern-regex: 'from\s+["'']@/layout(?:/[^"'']*)?["'']'

  - id: no-legacy-platform-root-imports
    message: Shared UI/helpers live under @/platform.
    languages: [typescript]
    severity: ERROR
    pattern-regex: 'from\s+["'']@/(?:components|hooks|lib|env|emails)(?:/[^"'']*)?["'']'

  - id: legacy-server-import
    message: src/server was removed; use module-owned public APIs or composition roots.
    languages: [typescript]
    severity: ERROR
    pattern-regex: 'from\s+["'']@/server(?:/[^"'']*)?["'']'

  - id: unsafe-redirect-from-user-input
    message: Validate redirect targets against an allowlist; do not pass raw request input.
    languages: [typescript]
    severity: ERROR
    pattern-either:
      - pattern: 'redirect({ to: $REQ.$X.$Y, ... })'
      - pattern: 'Response.redirect($REQ.$X.$Y, ...)'

  - id: token-or-secret-logging
    message: Do not log tokens, secrets, passwords, or Authorization headers.
    languages: [typescript]
    severity: ERROR
    pattern-either:
      - pattern: '$LOG.$M(..., { ..., token: $T, ... })'
      - pattern: '$LOG.$M(..., { ..., authorization: $A, ... })'
      - pattern: '$LOG.$M(..., { ..., password: $P, ... })'
      - pattern: '$LOG.$M(..., $REQ.headers.authorization, ...)'
      - pattern: 'console.log(..., $REQ.headers.authorization, ...)'
    paths:
      exclude:
        - '**/*.unit.spec.ts'
        - '**/*.test.ts'

  - id: domain-imports-react-or-router
    message: domain/ must not import React or routing libs.
    languages: [typescript]
    severity: ERROR
    pattern-regex: '^\s*import(?:\s+type)?(?:\s+[^;]+?\s+from\s+|\s*)["''](?:react|@tanstack/react-router|@tanstack/react-query)["'']'
    paths:
      include:
        - src/modules/*/domain/**

  - id: ci-oxlint-deny-warnings
    message: CI oxlint runs must include --deny-warnings so warning-level rules fail builds.
    languages: [generic]
    severity: ERROR
    pattern-regex: 'run:\s*pnpm\s+(?:lint|oxlint)(?![^\n]*--deny-warnings)\b[^\n]*'
    paths:
      include:
        - .github/workflows/*.yml
        - .github/workflows/*.yaml

  - id: lefthook-format-changed-stage-fixed
    message: format:changed pre-commit hooks must set stage_fixed true so formatter edits are committed.
    languages: [generic]
    severity: ERROR
    pattern-regex: '(?ms)^pre-commit:\s*\n(?:(?!^\S).)*?^\s{4}format:\s*\n(?=(?:(?!^\s{4}\S).)*^\s{6}run:\s*pnpm\s+format:changed[^\n]*)(?!(?:(?!^\s{4}\S).)*^\s{6}stage_fixed:\s*true)'
    paths:
      include:
        - lefthook.yml
        - lefthook.yaml

  - id: script-git-diff-through-git-utils
    message: Use scripts/lib/git-utils.mjs for changed-file discovery so staged files are included consistently.
    languages: [generic]
    severity: ERROR
    pattern-regex: 'runGit\(\[\s*["'']diff["'']'
    paths:
      include:
        - scripts/*.mjs
      exclude:
        - scripts/lib/git-utils.mjs

  - id: resend-app-error-preserve-provider-status
    message: Preserve Resend provider statusCode when wrapping send failures; use error.statusCode ?? 500.
    languages: [typescript]
    severity: ERROR
    pattern: |
      throw new AppError({
        ...,
        status: 500,
        ...
      })
    paths:
      include:
        - src/modules/kernel/infrastructure/email/**/*.ts
        - src/modules/kernel/infrastructure/email/**/*.tsx
      exclude:
        - '**/*.unit.spec.ts'
        - '**/*.test.ts'

  - id: db-client-no-unguarded-import-meta-env
    message: Guard import.meta.env access in the DB client because seed scripts can run outside Vite.
    languages: [typescript]
    severity: ERROR
    pattern-regex: 'import\.meta\.env\.[A-Za-z_$][A-Za-z0-9_$]*'
    paths:
      include:
        - src/modules/kernel/infrastructure/db/client.ts
