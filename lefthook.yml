pre-commit:
  commands:
    check:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc,css,scss}'
      run: pnpm oxfmt {staged_files}
      stage_fixed: true
    oxlint:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx}'
      run: pnpm oxlint --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    check:
      run: pnpm lint
