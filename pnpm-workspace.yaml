engineStrict: true
sideEffectsCache: false
# Refuse npm versions published less than 24h ago — the window in which most
# compromised releases (e.g. Shai-Hulud-style worms) are detected and unpublished.
minimumReleaseAge: 1440

overrides:
  '@esbuild-kit/core-utils>esbuild': 0.25.0
  '@types/node': ^24
  body-parser: 1.20.4
  effect: 3.21.2
  # PR #40, 2026-05-27: keep toolchain consumers on a known-good current glob 13 release.
  # Re-evaluate after the next dependency compatibility pass confirms the override is no longer needed.
  glob: 13.0.6
  http-proxy-middleware: 3.0.7
  # better-auth 1.6.13 advertises kysely 0.29 support, but its kysely adapter
  # still imports root migration constants removed at runtime in kysely 0.29.
  kysely: 0.28.17
  qs: 6.15.2
  'react-cosmos>ws': 8.21.0
  shell-quote: 1.8.4
  svgo: 4.0.1
  'testcontainers>undici': 7.28.0

peerDependencyRules:
  allowedVersions:
    '@tanstack/zod-adapter>zod': '4'

allowBuilds:
  '@parcel/watcher': true
  '@sentry/cli': true
  '@tailwindcss/oxide': true
  bufferutil: false
  cpu-features: false
  esbuild: true
  lefthook: true
  protobufjs: false
  sharp: true
  ssh2: false
